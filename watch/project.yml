# XcodeGen spec for Pinch — the watchOS Ultra remote for Claude Code.
#
# Prereq: `brew install xcodegen`, then run `xcodegen generate` in this directory.
# That produces `Pinch.xcodeproj`. Open it, pick the "Pinch" target, set your
# Development Team under Signing & Capabilities, change the bundle id to one you own,
# then build/run on an Apple Watch (Series 9 / Ultra 2 or later for double-tap).
#
# This is a SINGLE-TARGET watchOS app (watchOS 11 dropped the need for a paired
# iOS "WatchKit App" container — a standalone watchOS App target installs directly).

name: Pinch
options:
  bundleIdPrefix: com.josh.pinch          # PLACEHOLDER — change to a prefix you own.
  deploymentTarget:
    watchOS: "11.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"                   # builds clean under the Swift 6 compiler too.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES
    # The "Generate BuildStamp" preBuildScript writes Sources/Shared/BuildStamp.swift into the
    # source tree before Compile Sources. Script sandboxing (Xcode's default can be YES) would
    # deny that write, leaving a stale stamp — explicitly OFF so the stamp is always fresh.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Pinch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    # Sources are split into Shared/ (compiled by BOTH the watch and the phone),
    # Watch/ (watchOS-only: crown, WatchKit dictation, the watch view layer), and Phone/
    # (iOS-only — NOT compiled here). The watch target builds Shared + Watch, which together
    # are exactly the file set this target compiled before the split — so its build is unchanged.
    sources:
      - path: Sources/Shared
      - path: Sources/Watch
    # Stamp the binary BEFORE Compile Sources so Settings → Build proves which build is on the
    # wrist. The anchor (&buildstamp) is reused verbatim by the PinchPhone target below.
    preBuildScripts:
      - &buildstamp
        name: Generate BuildStamp
        basedOnDependencyAnalysis: false          # always run; the stamp must be fresh every build
        script: |
          set -e
          cd "$SRCROOT"
          SHA=$(git rev-parse --short=8 HEAD 2>/dev/null || echo nogit)
          [ -n "$(git status --porcelain --untracked-files=no 2>/dev/null)" ] && SHA="${SHA}+"
          STAMP="${SHA} @ $(date '+%b %d %H:%M:%S')"
          OUT="$SRCROOT/Sources/Shared/BuildStamp.swift"
          printf '%s\n' \
            '// AUTO-GENERATED every build by the "Generate BuildStamp" preBuildScript in watch/project.yml.' \
            '// Gitignored. Do not edit by hand -- overwritten on the next build.' \
            "enum BuildStamp { static let value = \"$STAMP\" }" > "$OUT"
          echo "BuildStamp -> $STAMP"
    # Info.plist and entitlements are hand-maintained STATIC files (not generated by
    # XcodeGen). We reference them via build settings below; do NOT add `info:`/`entitlements:`
    # keys here — those make XcodeGen overwrite the files with empty defaults.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshua.kappler.pinch.watch  # Josh's bundle id (personal team).
        INFOPLIST_FILE: Info.plist                         # use the static plist as-is.
        CODE_SIGN_ENTITLEMENTS: Pinch.entitlements         # use the static entitlements as-is.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon        # Claude-burst icon in Sources/Watch/Assets.xcassets.
        # Baked in so `xcodegen generate` never wipes signing again (it kept resetting these).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XWFX4XAKK4                        # Josh's personal Apple Developer team.

  # The iPhone app. A SEPARATE, INDEPENDENT app target (not a paired WatchKit companion) —
  # it talks to the same backend over the same HTTP API as the watch and shares the entire
  # Shared/ core (protocol, transport/outbox/resume engine, Store, Speaker, haptics, push).
  # Only its view layer (Sources/Phone) is new. Standalone so the watch never depends on it.
  PinchPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
      - path: Sources/Phone
    preBuildScripts:
      - *buildstamp                              # same stamp generator as the watch target
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshua.kappler.pinch.phone   # sibling of the watch id.
        INFOPLIST_FILE: iOS-Info.plist                              # static plist (GENERATE_INFOPLIST_FILE is NO).
        CODE_SIGN_ENTITLEMENTS: PinchPhone.entitlements             # empty — no aps-environment (personal team).
        TARGETED_DEVICE_FAMILY: "1"                                 # iPhone only (this is the phone version).
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XWFX4XAKK4                                # same personal Apple Developer team.
    # Capabilities are declared in Pinch.entitlements:
    #   • Push Notifications (aps-environment) — for the APNs re-engagement path.
    #   • Extended Runtime sessions are use-case-gated by Apple; if you ever need one,
    #     add `com.apple.developer.watchkit.extended-runtime-session` to the entitlements
    #     and the matching capability here. We deliberately DO NOT request it (see README).

# Define the scheme EXPLICITLY so XcodeGen writes a SHARED scheme
# (Pinch.xcodeproj/xcshareddata/xcschemes/Pinch.xcscheme) that survives every
# `xcodegen generate`. Without this, the project has no scheme after regeneration —
# Xcode's autocreated user scheme gets wiped and Cmd-R (Run) silently does nothing
# until you reopen the project. A committed shared scheme makes Run work immediately
# on a fresh generate.
schemes:
  Pinch:
    build:
      targets:
        Pinch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PinchPhone:
    build:
      targets:
        PinchPhone: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
