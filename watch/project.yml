# XcodeGen spec for Pinch — the watchOS Ultra remote for Claude Code.
#
# Prereq: `brew install xcodegen`, then run `xcodegen generate` in this directory.
# That produces `Pinch.xcodeproj`. Open it, pick the "Pinch" target, set your
# Development Team under Signing & Capabilities, change the bundle id to one you own,
# then build/run on an Apple Watch (Series 9 / Ultra 2 or later for double-tap).
#
# This is a SINGLE-TARGET watchOS app (watchOS 11 dropped the need for a paired
# iOS "WatchKit App" container — a standalone watchOS App target installs directly).

name: Pinch
options:
  bundleIdPrefix: com.josh.pinch          # PLACEHOLDER — change to a prefix you own.
  deploymentTarget:
    watchOS: "11.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"                   # builds clean under the Swift 6 compiler too.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES

targets:
  Pinch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: Sources
    # Info.plist and entitlements are hand-maintained STATIC files (not generated by
    # XcodeGen). We reference them via build settings below; do NOT add `info:`/`entitlements:`
    # keys here — those make XcodeGen overwrite the files with empty defaults.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.josh.pinch.watch   # PLACEHOLDER — make it yours.
        INFOPLIST_FILE: Info.plist                         # use the static plist as-is.
        CODE_SIGN_ENTITLEMENTS: Pinch.entitlements         # use the static entitlements as-is.
        ASSETCATALOG_COMPILER_APPICON_NAME: ""             # add an AppIcon set in Xcode if you want one.
        # CODE_SIGN_STYLE / DEVELOPMENT_TEAM are intentionally unset — set your team in Xcode.
    # Capabilities are declared in Pinch.entitlements:
    #   • Push Notifications (aps-environment) — for the APNs re-engagement path.
    #   • Extended Runtime sessions are use-case-gated by Apple; if you ever need one,
    #     add `com.apple.developer.watchkit.extended-runtime-session` to the entitlements
    #     and the matching capability here. We deliberately DO NOT request it (see README).
